<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheatiOSVip Menu Full</title>
    <style>
        :root {
            --bg-main: rgba(18, 18, 18, 0.95);
            --bg-sidebar: rgba(28, 28, 30, 0.8);
            --accent: #4ade80;
            --accent-dark: #22c55e;
            --text: #ffffff;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-user-select: none;
        }

        .mod-menu {
            width: 280px;
            background: var(--bg-main);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            border: 1px solid var(--border);
            color: var(--text);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .header {
            padding: 14px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
        }

        .main-container { display: flex; height: 320px; }

        .sidebar {
            width: 85px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
        }

        .tab-item {
            padding: 16px 5px;
            font-size: 11px;
            text-align: center;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 0.5px solid var(--border);
            transition: 0.2s;
        }

        .tab-item.active {
            background: #2a2a2c;
            color: var(--accent);
            font-weight: bold;
        }

        .content { flex: 1; padding: 14px; overflow-y: auto; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 12.5px;
            font-weight: 500;
        }

        /* Switch đẹp hơn */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3f3f46;
            transition: .4s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* AIMLOCK đặc biệt khi bật */
        .aimlock-item.active {
            color: var(--accent);
            font-weight: 600;
        }

        /* Slider */
        .range-box {
            margin: 16px 0;
        }
        .range-label {
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            height: 5px;
            border-radius: 5px;
        }

        .value {
            font-size: 12px;
            color: #ddd;
            min-width: 38px;
            text-align: right;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.95);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }

        .close-btn {
            width: 100%;
            padding: 14px;
            background: none;
            border: none;
            border-top: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .content::-webkit-scrollbar { width: 3px; }
        .content::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="mod-menu">
    <div class="header">CheatiOSVip / FreeFire</div>
    
    <div class="main-container">
        <div class="sidebar">
            <div class="tab-item active" onclick="switchTab(event, 'Chức Năng 1')">Chức Năng 1</div>
            <div class="tab-item" onclick="switchTab(event, 'Chức Năng 2')">Chức Năng 2</div>
            <div class="tab-item" onclick="switchTab(event, 'Chức Năng 3')">Chức Năng 3</div>
            <div class="tab-item" onclick="switchTab(event, 'Tối Ưu Máy')">Tối Ưu Máy</div>
        </div>

        <div class="content">
            <div id="Chức Năng 1" class="tab-pane active">
                <!-- AIMLOCK với slider -->
                <div class="item aimlock-item" id="aimlockContainer">
                    <span>AIMLOCK</span> 
                    <label class="switch">
                        <input type="checkbox" id="aimlockToggle" onchange="toggleAimlock(this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>

                <div id="aimlockSettings" style="display: none;">
                    <div class="range-box">
                        <div class="range-label">
                            <span>Smooth</span>
                            <span id="smooth-val" class="value">12.0</span>
                        </div>
                        <input type="range" id="smoothSlider" min="1" max="30" step="0.5" value="12" 
                               oninput="updateValue('smooth', this.value)">
                    </div>

                    <div class="range-box">
                        <div class="range-label">
                            <span>FOV</span>
                            <span id="fov-val" class="value">6.0</span>
                        </div>
                        <input type="range" id="fovSlider" min="1" max="15" step="0.5" value="6" 
                               oninput="updateValue('fov', this.value)">
                    </div>

                    <div class="range-box">
                        <div class="range-label">
                            <span>Range</span>
                            <span id="range-val" class="value">60</span>
                        </div>
                        <input type="range" id="rangeSlider" min="10" max="120" step="5" value="60" 
                               oninput="updateValue('range', this.value)">
                    </div>
                </div>

                <div class="item"><span>NHẸ TÂM</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Ổn Định Tâm </span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Giảm lố</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Giảm Lệch Đạn</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>

            <!-- Các tab khác giữ nguyên (rút gọn) -->
            <div id="Chức Năng 2" class="tab-pane">
                <div class="item"><span>Fix Rung</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Bám đầu</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Đầm Tâm</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Nhạy Tâm</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>

            <div id="Chức Năng 3" class="tab-pane">
                <div class="item"><span>HoldLock</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Nhạy Device</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Sensi</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>SensiGun</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>

            <div id="Tối Ưu Máy" class="tab-pane">
                <div class="item"><span>Buff Fps </span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="item"><span>Tối Ưu Game </span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>
        </div>
    </div>
    
    <button class="close-btn" onclick="closeMenu()"> MinaRiin🐸 </button>
</div>

<!-- Toast thông báo -->
<div id="toast" class="toast"></div>

<script>
    let isAimlockEnabled = false;
    let currentValues = { smooth: 12, fov: 6, range: 60 };

    function switchTab(e, tabId) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0)';

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(-20px)';
        }, 2200);
    }

    function toggleAimlock(enabled) {
        isAimlockEnabled = enabled;
        const container = document.getElementById('aimlockContainer');
        const settings = document.getElementById('aimlockSettings');

        if (enabled) {
            container.classList.add('active');
            settings.style.display = 'block';
            showToast("✅ AIMLOCK đã BẬT");
        } else {
            container.classList.remove('active');
            settings.style.display = 'none';
            showToast("❌ AIMLOCK đã TẮT");
        }

        // Gửi sang Unity / Native (nếu có)
        if (typeof unityInstance !== "undefined") {
            unityInstance.SendMessage("AimAssist", "SetAimlockEnabled", enabled ? 1 : 0);
        } else {
            console.log(`[AIMLOCK] ${enabled ? 'BẬT' : 'TẮT'} | Smooth:${currentValues.smooth} | FOV:${currentValues.fov} | Range:${currentValues.range}`);
        }
    }

    function updateValue(type, value) {
        currentValues[type] = parseFloat(value);
        document.getElementById(type + '-val').textContent = currentValues[type];

        // Gửi giá trị mới sang Unity (nếu cần)
        if (typeof unityInstance !== "undefined" && isAimlockEnabled) {
            unityInstance.SendMessage("AimAssist", "Update" + type.charAt(0).toUpperCase() + type.slice(1), parseFloat(value));
        }
    }

    function closeMenu() {
        console.log("Menu đóng");
        // Có thể thêm logic tắt hết cheat ở đây
    }

    // Khởi tạo giá trị slider
    window.onload = () => {
        document.getElementById('smooth-val').textContent = currentValues.smooth;
        document.getElementById('fov-val').textContent = currentValues.fov;
        document.getElementById('range-val').textContent = currentValues.range;
    };
</script>

</body>
</html>
